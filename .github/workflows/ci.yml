name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  node:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  # Coverage gate + Codecov upload. `npm run coverage` fails the job if any
  # metric falls below the >99% thresholds in vitest.config.ts, then the lcov
  # report is published to Codecov for the per-PR status check.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm run coverage
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  bun:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx vitest run
      - run: bun build packages/core/src/bin/probe.ts --compile --outfile probe-bin

  # The Docker gate: the full CI gate run inside a clean, reproducible Linux
  # container. This is the required status check for merging to main.
  docker-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.test -t openhawkins-test .
      - run: docker run --rm openhawkins-test
